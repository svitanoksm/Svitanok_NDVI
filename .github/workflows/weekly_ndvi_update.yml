name: Weekly NDVI Update

on:
  workflow_dispatch:
  schedule:
    - cron: '2 14 * * *'

jobs:
  run-ndvi-calculator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials file
        run: echo "$GCP_JSON" > credentials.json
        env:
          GCP_JSON: ${{ secrets.GCP_JSON }}

      - name: Run calculator
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/credentials.json
        run: python ndvi_calculator.py
